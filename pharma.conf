# ============================================================
#  Configuration Apache - G-Pharm
# ============================================================
#
#  INSTRUCTIONS POUR RESTAURER LE SITE :
#
#  Option 1 (recommandée) - Include dans httpd.conf :
#    1. Ouvrir /etc/httpd/conf/httpd.conf
#    2. Ajouter à la fin du fichier :
#         Include /srv/http/ProjetPharma/pharma.conf
#    3. Redémarrer Apache :
#         sudo systemctl restart httpd
#
#  Option 2 - Copier dans extra/ :
#    sudo cp /srv/http/ProjetPharma/pharma.conf /etc/httpd/conf/extra/
#    Puis ajouter dans httpd.conf :
#         Include conf/extra/pharma.conf
#
# ============================================================

DocumentRoot "/srv/http/ProjetPharma"

<Directory "/srv/http/ProjetPharma">
    Options Indexes FollowSymLinks MultiViews
    AllowOverride All
    Require all granted
</Directory>

# Optionnel - Journaux d'erreurs spécifiques à G-Pharm :
# ErrorLog  "/var/log/httpd/pharma-error.log"
# CustomLog "/var/log/httpd/pharma-access.log" combined
